<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación — Líder de Soporte TI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --azul:    #1a3a5c;
  --azul2:   #2563a8;
  --acento:  #e8a020;
  --fondo:   #f4f1eb;
  --blanco:  #ffffff;
  --gris1:   #e8e4dc;
  --gris2:   #9e9890;
  --texto:   #1c1a17;
  --ok:      #1a7a4a;
  --error:   #c0392b;
  --radio:   6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--fondo);
  color: var(--texto);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ── PANTALLA LOGIN ─────────────────────────────────────── */
#pantalla-login {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--azul);
  position: relative;
  overflow: hidden;
}

#pantalla-login::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(37,99,168,0.4) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 10% 80%, rgba(232,160,32,0.15) 0%, transparent 60%);
}

.login-card {
  position: relative;
  background: var(--blanco);
  border-radius: 12px;
  padding: 52px 48px;
  width: 420px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.35);
}

.login-logo {
  text-align: center;
  margin-bottom: 36px;
}

.login-logo .icono {
  width: 64px;
  height: 64px;
  background: var(--azul);
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
}

.login-logo .icono svg { width: 34px; height: 34px; fill: var(--acento); }

.login-logo h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--azul);
  line-height: 1.3;
}

.login-logo p {
  font-size: 13px;
  color: var(--gris2);
  margin-top: 4px;
}

.campo {
  margin-bottom: 18px;
}

.campo label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--gris2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}

.campo input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--gris1);
  border-radius: var(--radio);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--texto);
  background: var(--fondo);
  outline: none;
  transition: border-color 0.2s;
}

.campo input:focus { border-color: var(--azul2); background: var(--blanco); }

.btn-primary {
  width: 100%;
  padding: 13px;
  background: var(--azul);
  color: var(--blanco);
  border: none;
  border-radius: var(--radio);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  margin-top: 8px;
}

.btn-primary:hover  { background: var(--azul2); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.msg-error {
  background: #fdf0ee;
  border: 1px solid #f5c6c0;
  color: var(--error);
  border-radius: var(--radio);
  padding: 10px 14px;
  font-size: 13px;
  margin-top: 14px;
  display: none;
}

/* ── LAYOUT PRINCIPAL ───────────────────────────────────── */
#app { display: none; min-height: 100vh; flex-direction: column; }

header {
  background: var(--azul);
  color: var(--blanco);
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}

header .logo {
  font-family: 'DM Serif Display', serif;
  font-size: 17px;
  display: flex;
  align-items: center;
  gap: 10px;
}

header .logo span {
  background: var(--acento);
  color: var(--azul);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 4px;
}

.header-info {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 13px;
}

.badge-rol {
  background: rgba(255,255,255,0.15);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}

.badge-rol.entrevistador { background: var(--acento); color: var(--azul); }

#btn-logout {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  color: var(--blanco);
  padding: 5px 12px;
  border-radius: var(--radio);
  font-size: 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.2s;
}
#btn-logout:hover { background: rgba(255,255,255,0.1); }

/* ── CONTENIDO ──────────────────────────────────────────── */
main { flex: 1; padding: 32px; max-width: 900px; margin: 0 auto; width: 100%; }

/* ── BARRA DE PROGRESO ──────────────────────────────────── */
.progreso-wrap {
  background: var(--blanco);
  border-radius: 10px;
  padding: 20px 24px;
  margin-bottom: 28px;
  border: 1px solid var(--gris1);
}

.progreso-titulo {
  font-size: 12px;
  font-weight: 600;
  color: var(--gris2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

.momentos-bar {
  display: flex;
  gap: 8px;
}

.momento-item {
  flex: 1;
  text-align: center;
}

.momento-item .m-label {
  font-size: 11px;
  color: var(--gris2);
  margin-bottom: 6px;
  font-weight: 500;
}

.momento-item .m-barra {
  height: 6px;
  border-radius: 3px;
  background: var(--gris1);
  transition: background 0.3s;
}

.momento-item.activo .m-label { color: var(--azul2); font-weight: 600; }
.momento-item.activo .m-barra { background: var(--azul2); }
.momento-item.completado .m-barra { background: var(--ok); }
.momento-item.completado .m-label { color: var(--ok); }

.tiempo-badge {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--azul2);
  background: #e8f0fb;
  padding: 3px 10px;
  border-radius: 4px;
  margin-top: 8px;
  display: inline-block;
}

/* ── TARJETA MOMENTO ────────────────────────────────────── */
.momento-card {
  background: var(--blanco);
  border-radius: 10px;
  border: 1px solid var(--gris1);
  margin-bottom: 24px;
  overflow: hidden;
}

.momento-header {
  background: var(--azul);
  color: var(--blanco);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.momento-header h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
}

.momento-header .m-badge {
  background: var(--acento);
  color: var(--azul);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 4px;
}

.momento-body { padding: 0; }

/* ── PREGUNTA ───────────────────────────────────────────── */
.pregunta-item {
  padding: 22px 24px;
  border-bottom: 1px solid var(--gris1);
  transition: background 0.2s;
}

.pregunta-item:last-child { border-bottom: none; }
.pregunta-item:hover { background: #fafaf8; }

.pregunta-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.pregunta-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--blanco);
  background: var(--azul2);
  padding: 2px 8px;
  border-radius: 3px;
}

.tipo-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 3px;
  font-weight: 500;
}

.tipo-badge.abierta  { background: #e8f0fb; color: var(--azul2); }
.tipo-badge.cerrada  { background: #fef6e4; color: #b45309; }

.sc-badge {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  background: var(--gris1);
  color: var(--gris2);
  font-family: 'DM Mono', monospace;
}

.pregunta-texto {
  font-size: 15px;
  color: var(--texto);
  margin-bottom: 14px;
  line-height: 1.6;
}

.pregunta-contexto {
  background: #f0f4fa;
  border-left: 3px solid var(--azul2);
  padding: 12px 16px;
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  color: #334;
  margin-bottom: 14px;
  line-height: 1.6;
}

/* Opciones cerradas */
.opciones { display: flex; flex-direction: column; gap: 8px; }

.opcion-label {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  border: 1.5px solid var(--gris1);
  border-radius: var(--radio);
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  font-size: 14px;
  line-height: 1.5;
}

.opcion-label:hover { border-color: var(--azul2); background: #f0f4fa; }

.opcion-label input[type="radio"] { margin-top: 2px; accent-color: var(--azul2); flex-shrink: 0; }

.opcion-label.seleccionada { border-color: var(--azul2); background: #e8f0fb; }

/* Textarea abierta */
.resp-abierta {
  width: 100%;
  min-height: 100px;
  padding: 12px 14px;
  border: 1.5px solid var(--gris1);
  border-radius: var(--radio);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--texto);
  background: var(--fondo);
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
  line-height: 1.6;
}

.resp-abierta:focus { border-color: var(--azul2); background: var(--blanco); }

/* ── BOTÓN SIGUIENTE MOMENTO ────────────────────────────── */
.btn-siguiente {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  background: var(--azul);
  color: var(--blanco);
  border: none;
  border-radius: var(--radio);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 8px;
}

.btn-siguiente:hover { background: var(--azul2); }
.btn-siguiente:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── PANTALLA FINAL CANDIDATO ───────────────────────────── */
.pantalla-final {
  text-align: center;
  padding: 60px 32px;
  background: var(--blanco);
  border-radius: 12px;
  border: 1px solid var(--gris1);
}

.pantalla-final .check {
  width: 72px;
  height: 72px;
  background: var(--ok);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
}

.pantalla-final .check svg { width: 36px; height: 36px; stroke: white; fill: none; stroke-width: 2.5; }

.pantalla-final h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: var(--azul);
  margin-bottom: 12px;
}

.pantalla-final p { color: var(--gris2); font-size: 15px; }

.resumen-tiempos {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 28px;
  flex-wrap: wrap;
}

.resumen-tiempo-item {
  background: var(--fondo);
  border-radius: 8px;
  padding: 14px 20px;
  text-align: center;
  border: 1px solid var(--gris1);
}

.resumen-tiempo-item .t-label { font-size: 11px; color: var(--gris2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.resumen-tiempo-item .t-valor { font-family: 'DM Mono', monospace; font-size: 20px; color: var(--azul); font-weight: 500; margin-top: 4px; }

/* ── VISTA ENTREVISTADOR ────────────────────────────────── */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  background: var(--gris1);
  padding: 4px;
  border-radius: 8px;
}

.tab-btn {
  flex: 1;
  padding: 9px 16px;
  border: none;
  border-radius: 6px;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--gris2);
  cursor: pointer;
  transition: all 0.2s;
}

.tab-btn.activo {
  background: var(--blanco);
  color: var(--azul);
  font-weight: 600;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

.tab-content { display: none; }
.tab-content.activo { display: block; }

/* Selector candidato */
.select-candidato {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--gris1);
  border-radius: var(--radio);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--texto);
  background: var(--blanco);
  outline: none;
  margin-bottom: 20px;
  cursor: pointer;
}

.select-candidato:focus { border-color: var(--azul2); }

/* Tarjeta respuesta para calificar */
.resp-card {
  background: var(--blanco);
  border: 1px solid var(--gris1);
  border-radius: 8px;
  padding: 18px 20px;
  margin-bottom: 14px;
}

.resp-card .rc-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.resp-card .rc-pregunta {
  font-weight: 600;
  font-size: 14px;
  color: var(--azul);
  margin-bottom: 8px;
}

.resp-card .rc-respuesta {
  font-size: 14px;
  color: var(--texto);
  background: var(--fondo);
  border-radius: 6px;
  padding: 10px 14px;
  margin-bottom: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
}

.calif-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.calif-row label { font-size: 13px; font-weight: 600; color: var(--gris2); white-space: nowrap; }

.estrellas { display: flex; gap: 4px; }

.estrella-btn {
  width: 36px;
  height: 36px;
  border: 2px solid var(--gris1);
  border-radius: 6px;
  background: var(--blanco);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--gris2);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.estrella-btn:hover { border-color: var(--acento); color: var(--acento); }
.estrella-btn.sel { background: var(--acento); border-color: var(--acento); color: var(--azul); }

.obs-input {
  flex: 1;
  padding: 8px 12px;
  border: 1.5px solid var(--gris1);
  border-radius: var(--radio);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  outline: none;
}

.obs-input:focus { border-color: var(--azul2); }

.btn-guardar-calif {
  padding: 8px 16px;
  background: var(--ok);
  color: var(--blanco);
  border: none;
  border-radius: var(--radio);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  white-space: nowrap;
}

.btn-guardar-calif:hover { opacity: 0.85; }
.btn-guardar-calif.guardado { background: var(--gris2); }

/* Resultados */
.resultado-card {
  background: var(--blanco);
  border: 1px solid var(--gris1);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.resultado-header {
  background: var(--azul);
  color: var(--blanco);
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.resultado-header h3 { font-family: 'DM Serif Display', serif; font-size: 17px; }

.puntaje-final {
  font-family: 'DM Mono', monospace;
  font-size: 24px;
  font-weight: 500;
  color: var(--acento);
}

.dominios-grid { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.dominio-item {
  background: var(--fondo);
  border-radius: 8px;
  padding: 14px 16px;
}

.dominio-item .d-nombre { font-size: 12px; color: var(--gris2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.dominio-item .d-puntaje { font-family: 'DM Mono', monospace; font-size: 22px; color: var(--azul); }
.dominio-item .d-barra-wrap { height: 6px; background: var(--gris1); border-radius: 3px; margin-top: 8px; overflow: hidden; }
.dominio-item .d-barra { height: 100%; border-radius: 3px; background: var(--azul2); transition: width 0.6s ease; }

/* Rúbrica M4 */
.rubrica-item {
  background: var(--blanco);
  border: 1px solid var(--gris1);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 12px;
}

.rubrica-item h4 { font-size: 14px; font-weight: 600; color: var(--azul); margin-bottom: 12px; }

/* Loading */
.loader {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,58,92,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  display: none;
}

.loading-box {
  background: var(--blanco);
  border-radius: 12px;
  padding: 32px 40px;
  text-align: center;
  font-size: 15px;
  color: var(--azul);
  font-weight: 500;
}

.loading-box .loader {
  border-color: rgba(26,58,92,0.2);
  border-top-color: var(--azul);
  width: 32px;
  height: 32px;
  margin-bottom: 14px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--azul);
  color: var(--blanco);
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  z-index: 2000;
  transform: translateY(60px);
  opacity: 0;
  transition: all 0.3s;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

.toast.show { transform: translateY(0); opacity: 1; }
.toast.ok   { background: var(--ok); }
.toast.err  { background: var(--error); }

/* Responsive */
@media (max-width: 600px) {
  main { padding: 16px; }
  .dominios-grid { grid-template-columns: 1fr; }
  .login-card { width: 90%; padding: 36px 24px; }
  .calif-row { flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading">
  <div class="loading-box">
    <div class="loader"></div>
    <span id="loading-msg">Cargando...</span>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="pantalla-login">
  <div class="login-card">
    <div class="login-logo">
      <div class="icono">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <h1>Evaluación<br>Líder de Soporte TI</h1>
      <p>Colegio Tilatá — Sistema de Evaluación por Competencias</p>
    </div>
    <div class="campo">
      <label>Usuario</label>
      <input type="text" id="inp-usuario" placeholder="ej: jgarcia1" autocomplete="off">
    </div>
    <div class="campo">
      <label>Contraseña</label>
      <input type="password" id="inp-pass" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="btn-login">Ingresar</button>
    <div class="msg-error" id="login-error"></div>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app">
  <header>
    <div class="logo">
      Evaluación TI
      <span>Colegio Tilatá</span>
    </div>
    <div class="header-info">
      <span id="header-nombre">—</span>
      <span class="badge-rol" id="header-rol">—</span>
      <button id="btn-logout">Salir</button>
    </div>
  </header>

  <main id="main-content"></main>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyvx9YJYNch1CeYUOsBdE6vStWUF-PSFDNMRcWLcdMZnxTBkAPfblRbHYwjLqKvX0Myqw/exec";

// ── ESTADO GLOBAL ────────────────────────────────────────
const estado = {
  rol: null,
  nombre: null,

// ── UTILIDADES ───────────────────────────────────────────
function mostrarLoading(msg = "Procesando...") {
  document.getElementById("loading-msg").textContent = msg;
  document.getElementById("loading").style.display = "flex";
}

function ocultarLoading() {
  document.getElementById("loading").style.display = "none";
}

function mostrarToast(msg, tipo = "ok") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show ${tipo}`;
  setTimeout(() => { t.className = "toast"; }, 3000);
}

async function api(params) {
  const body = new URLSearchParams(params).toString();
  if (body.length > 1500 || params.action === "subirArchivo") {
    const r = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: body
    });
    return r.json();
  }
  const url = GAS_URL + "?" + body;
  const r = await fetch(url);
  return r.json();
}

function formatMin(seg) {
  if (!seg) return "--";
  const m = Math.floor(seg / 60);
  const s = seg % 60;
  return `${m}m ${s < 10 ? "0" : ""}${s}s`;
}

// ── LOGIN ────────────────────────────────────────────────
document.getElementById("btn-login").addEventListener("click", doLogin);
document.getElementById("inp-pass").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
document.getElementById("btn-logout").addEventListener("click", () => location.reload());

async function doLogin() {
  const usuario  = document.getElementById("inp-usuario").value.trim();
  const password = document.getElementById("inp-pass").value.trim();
  if (!usuario || !password) return;

  const btn = document.getElementById("btn-login");
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span>';
  mostrarLoading("Verificando credenciales...");

  try {
    const res = await api({ action: "login", usuario, password });
    if (res.ok) {
      estado.rol    = res.rol;
      estado.nombre = res.nombre;
      if (res.id) estado.idCandidato = res.id;
      iniciarApp();
    } else {
      const err = document.getElementById("login-error");
      err.textContent = res.error;
      err.style.display = "block";
    }
  } catch(e) {
    const err = document.getElementById("login-error");
    err.textContent = "Error de conexión. Intente nuevamente.";
    err.style.display = "block";
  }

  btn.disabled = false;
  btn.innerHTML = "Ingresar";
  ocultarLoading();
}

// ── INICIAR APP ──────────────────────────────────────────
async function iniciarApp() {
  document.getElementById("pantalla-login").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("header-nombre").textContent = estado.nombre;

  const rolEl = document.getElementById("header-rol");
  rolEl.textContent = estado.rol === "entrevistador" ? "Entrevistador" : "Candidato";
  if (estado.rol === "entrevistador") rolEl.classList.add("entrevistador");

  mostrarLoading("Cargando preguntas...");
  const res = await api({ action: "getPreguntas" });
  ocultarLoading();

  if (res.ok) {
    estado.preguntas = res.preguntas;
    if (estado.rol === "candidato") renderCandidato();
    else renderEntrevistador();
  }
}

async function avanzarMomento() {
  const btn = document.getElementById("btn-siguiente");
  btn.disabled = true;

  const m = estado.momentos[estado.momentoActual];
  const preguntas = estado.preguntas.filter(p => p.momento === m);

  // Calcular tiempo
  const ahora = Date.now();
  const segs = Math.round((ahora - estado.inicioMomento) / 1000);
  estado.tiempos[m] = segs;

  mostrarLoading("Guardando respuestas...");

  // Guardar cada respuesta
  for (const p of preguntas) {
    let respuesta = "";
    if (p.tipo === "Cerrada") {
      const sel = document.querySelector(`input[name="${p.codigo}"]:checked`);
      respuesta = sel ? sel.value : "Sin respuesta";
    } else {
      const ta = document.getElementById(`ta-${p.codigo}`);
      respuesta = ta ? ta.value.trim() || "Sin respuesta" : "Sin respuesta";
    }
    estado.respuestas[p.codigo] = respuesta;

    await api({
      action: "guardarRespuesta",
      idCandidato: estado.idCandidato,
      nombreCandidato: estado.nombre,
      pregunta: p.codigo,
      momento: m,
      respuesta: respuesta,
      tipo: p.tipo
    });
  }

  // Guardar tiempo
  await api({
    action: "guardarTiempo",
    id: estado.idCandidato,
    momento: m,
    tiempo: formatMin(segs)
  });

  ocultarLoading();

  if (estado.momentoActual < 3) {
    estado.momentoActual++;
    estado.inicioMomento = Date.now();
    renderMomento();
  } else {
    renderFinalCandidato();
  }
}

function switchTab(tab, btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("activo"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("activo"));
  btn.classList.add("activo");
  document.getElementById(`tab-${tab}`).classList.add("activo");
}

async function cargarCandidatos() {
  const selects = ["sel-candidato-calif", "sel-candidato-rubrica", "sel-candidato-res"];
  try {
    const url = GAS_URL + "?action=getCandidatos";
    const r = await fetch(url, { method: "GET", mode: "cors" });
    const res = await r.json();
    if (res.ok && res.candidatos && res.candidatos.length > 0) {
      selects.forEach(id => {
        const sel = document.getElementById(id);
        if (!sel) return;
        res.candidatos.forEach(c => {
          const opt = document.createElement("option");
          opt.value = c.id;
          opt.textContent = `${c.nombre} (${c.estado})`;
          sel.appendChild(opt);
        });
      });
    } else {
      mostrarToast("No hay candidatos registrados en el sistema.", "err");
    }
  } catch(e) {
    mostrarToast("Error al cargar candidatos: " + e.message, "err");
  }
}

async function cargarRespuestas() {
  const idCandidato = document.getElementById("sel-candidato-calif").value;
  if (!idCandidato) return;

  mostrarLoading("Cargando respuestas...");
  const res = await api({ action: "getCalificaciones", idCandidato });
  ocultarLoading();

  const zona = document.getElementById("zona-respuestas");
  if (!res.ok || !res.respuestas.length) {
    zona.innerHTML = `<p style="color:var(--gris2);text-align:center;padding:32px">No hay respuestas registradas para este candidato.</p>`;
    return;
  }

  // Solo mostrar abiertas para calificar
  const abiertas = res.respuestas.filter(r => r.tipo === "Abierta");
  if (!abiertas.length) {
    zona.innerHTML = `<p style="color:var(--gris2);text-align:center;padding:32px">Solo hay respuestas cerradas (ya calificadas automáticamente).</p>`;
    return;
  }

  let html = "";
  abiertas.forEach(r => {
    const pregObj = estado.preguntas.find(p => p.codigo === r.pregunta) || {};
    const scs = [pregObj.sc1, pregObj.sc2].filter(Boolean).join(", ");
    html += `
      <div class="resp-card" id="card-${r.pregunta}">
        <div class="rc-meta">
          <span class="pregunta-num">${r.pregunta}</span>
          <span class="tipo-badge abierta">${r.momento}</span>
          ${scs ? `<span class="sc-badge">${scs}</span>` : ""}
        </div>
        <div class="rc-pregunta">${pregObj.texto || r.pregunta}</div>
        <div class="rc-respuesta">${r.respuesta}</div>
        <div class="calif-row">
          <label>Calificación:</label>
          <div class="estrellas" id="est-${r.pregunta}">
            ${[1,2,3,4,5].map(n => `<button class="estrella-btn" onclick="selCalif('${r.pregunta}',${n},this)">${n}</button>`).join("")}
          </div>
          <input class="obs-input" id="obs-${r.pregunta}" placeholder="Observación (opcional)">
          <button class="btn-guardar-calif" onclick="guardarCalif('${r.pregunta}','${idCandidato}','${r.respuesta.replace(/'/g,"\\'")}','${scs}')">
            Guardar
          </button>
        </div>
      </div>`;
  });
  zona.innerHTML = html;
}

function selCalif(codigo, val, btn) {
  document.querySelectorAll(`#est-${codigo} .estrella-btn`).forEach(b => b.classList.remove("sel"));
  btn.classList.add("sel");
  btn.closest(".resp-card").dataset.calificacion = val;
}

async function guardarCalif(pregunta, idCandidato, respuesta, scs) {
  const card = document.getElementById(`card-${pregunta}`);
  const calif = card.dataset.calificacion;
  if (!calif) { mostrarToast("Seleccione una calificación (1-5)", "err"); return; }

  const obs = document.getElementById(`obs-${pregunta}`).value;
  const nombreCandidato = document.getElementById("sel-candidato-calif").options[
    document.getElementById("sel-candidato-calif").selectedIndex
  ].text;

  mostrarLoading("Guardando calificación...");
  const res = await api({
    action: "calificar",
    idCandidato,
    nombreCandidato,
    pregunta,
    respuesta: respuesta.substring(0, 200),
    subcompetencias: scs,
    calificacion: calif,
    observaciones: obs
  });
  ocultarLoading();

  if (res.ok) {
    const btn = card.querySelector(".btn-guardar-calif");
    btn.textContent = "✓ Guardado";
    btn.classList.add("guardado");
    mostrarToast("Calificación guardada", "ok");
  } else {
    mostrarToast("Error al guardar", "err");
  }
}

function renderRubrica() {
  const idCandidato = document.getElementById("sel-candidato-rubrica").value;
  if (!idCandidato) return;

  const nombreCandidato = document.getElementById("sel-candidato-rubrica").options[
    document.getElementById("sel-candidato-rubrica").selectedIndex
  ].text;

  const rubrica = [
    { cod: "M4-R01", criterio: "Identificación correcta de la falla", sc: "D2-SC01", peso: 25 },
    { cod: "M4-R02", criterio: "Metodología de diagnóstico aplicada", sc: "D2-SC01", peso: 25 },
    { cod: "M4-R03", criterio: "Profundidad técnica del análisis", sc: "D2-SC03", peso: 30 },
    { cod: "M4-R04", criterio: "Calidad y claridad de la documentación del informe", sc: "D4-SC01", peso: 20 },
  ];

  let html = `<p style="font-size:13px;color:var(--gris2);margin-bottom:16px">Candidato: <strong>${nombreCandidato}</strong> — Calificación del informe técnico M4</p>`;

  // Buscar enlace al PDF en respuestas
  html += `
    <div class="resp-card" style="margin-bottom:20px">
      <div class="rc-meta"><span class="pregunta-num">M4</span><span class="tipo-badge abierta">Informe PDF</span></div>
      <div class="rc-pregunta">Informe técnico entregado por el candidato</div>
      <div id="enlace-pdf-${idCandidato}" style="margin-top:8px;font-size:13px;color:var(--gris2)">Buscando informe...</div>
    </div>`;

  rubrica.forEach(r => {
    html += `
      <div class="rubrica-item" id="rub-${r.cod}">
        <h4>${r.cod} — ${r.criterio} <span style="font-weight:400;color:var(--gris2);font-size:12px">(${r.sc} · Peso ${r.peso}%)</span></h4>
        <div class="calif-row">
          <label>Calificación:</label>
          <div class="estrellas" id="est-${r.cod}">
            ${[1,2,3,4,5].map(n => `<button class="estrella-btn" onclick="selCalif('${r.cod}',${n},this)">${n}</button>`).join("")}
          </div>
          <input class="obs-input" id="obs-${r.cod}" placeholder="Observación del criterio">
          <button class="btn-guardar-calif" onclick="guardarCalif('${r.cod}','${idCandidato}','Rúbrica M4','${r.sc}')">Guardar</button>
        </div>
      </div>`;
  });

  document.getElementById("zona-rubrica").innerHTML = html;

  // Buscar el PDF en las respuestas del candidato
  api({ action: "getCalificaciones", idCandidato }).then(res => {
    const div = document.getElementById(`enlace-pdf-${idCandidato}`);
    if (!div) return;
    if (res.ok && res.respuestas) {
      const informe = res.respuestas.find(r => r.pregunta === "M4-INFORME");
      if (informe && informe.respuesta.startsWith("http")) {
        div.innerHTML = `<a href="${informe.respuesta}" target="_blank"
          style="color:var(--azul2);font-weight:600;text-decoration:none;padding:8px 14px;background:#e8f0fb;border-radius:var(--radio);display:inline-block">
          📄 Abrir informe técnico en Drive</a>`;
      } else {
        div.textContent = "El candidato aún no ha subido el informe.";
      }
    }
  });
}
